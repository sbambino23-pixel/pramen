<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>prAmen</title>
    <script>
        var path = window.location.pathname;
        if (path.startsWith('/join/')) {
            var code = path.replace('/join/', '').replace(/\//g, '');
            window.location.replace('/join/#' + code);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body></body>
</html>
